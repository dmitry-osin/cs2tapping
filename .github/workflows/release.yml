name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main

jobs:
  # ── Run on every push/PR to main ──────────────────
  check-build:
    name: Check Build
    runs-on: windows-latest
    if: "!startsWith(github.ref, 'refs/tags/v')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Local .cargo/config.toml hardcodes a machine-specific MSVC linker path
      # to work around MSYS2 on the dev machine. On CI the linker is in PATH.
      - name: Remove local Cargo linker override
        shell: pwsh
        run: Remove-Item -Force .cargo/config.toml -ErrorAction SilentlyContinue

      - name: Check Rust compilation
        shell: pwsh
        run: cd src-tauri && cargo check

      - name: Type-check frontend
        run: pnpm check

      - name: Build frontend
        run: pnpm build

  # ── Run only on version tags (e.g. v1.2.3) ──
  build-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Local .cargo/config.toml hardcodes a machine-specific MSVC linker path
      # to work around MSYS2 on the dev machine. On CI the linker is in PATH.
      - name: Remove local Cargo linker override
        shell: pwsh
        run: Remove-Item -Force .cargo/config.toml -ErrorAction SilentlyContinue

      # Strip the leading "v" and patch both version fields so the installer
      # and the About page always match the git tag.
      - name: Sync version from tag
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"   # e.g. v1.2.3
          $version = $tag.TrimStart('v')         # e.g. 1.2.3

          # tauri.conf.json
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          # Cargo.toml
          (Get-Content src-tauri/Cargo.toml) `
            -replace '^version\s*=\s*"[^"]+"', "version = `"$version`"" |
            Set-Content src-tauri/Cargo.toml

          # package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm exec tauri
          tagName: ${{ github.ref_name }}
          releaseName: CS2 Tapping ${{ github.ref_name }}
          releaseBody: |
            ## CS2 Tapping ${{ github.ref_name }}

            Counter-strafe helper for CS2. Automatically fires a brief opposite-direction key release to stop momentum and improve accuracy.

            ### Installation
            Download and run the `.msi` installer (recommended) or the NSIS `.exe` setup wizard.

            ### Requirements
            - Windows 10 / 11 (x64)
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
